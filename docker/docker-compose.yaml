# version: '3.9' 

services:
  django:
    build:
      context: ./django 
    container_name: django_app 
    command: gunicorn goit --bind 0.0.0.0:8000
    volumes:
      - ./django:/app 
      - static_content:/app/static
    env_file:
      - .env    
    depends_on:
      - db 

  db:
    image: postgres:14 
    container_name: postgres_db 
    env_file:
      - .env 
    volumes:
      - postgres_data:/var/lib/postgresql/data 
    

  nginx:
    image: nginx:latest 
    container_name: nginx 
    ports:
      - "80:80"
    volumes:
      - ./nginx:/etc/nginx/conf.d
      - static_content:/var/www/static
    depends_on:
      - django 

volumes:
  postgres_data:
  static_content:
