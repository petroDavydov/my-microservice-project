# final/modules/argo_cd/charts/values.yaml

applications:
  - name: django-app
    namespace: argocd
    project: default
    source:
      repoURL: https://github.com/petroDavydov/my-microservice-project.git
      path: final/charts/django-app
      targetRevision: final
      helm:
        valueFiles:
          - values.yaml
    destination:
      server: https://kubernetes.default.svc
      namespace: default
    syncPolicy:
      automated:
        prune: true
        selfHeal: true
