# lesson-8-9/modules/argo_cd/charts/values.yaml

applications:
  - name: example-app
    namespace: default
    project: default
    source:
      repoURL: https://github.com/petroDavydov/my-microservice-project.git
      path: charts/django-chart
      targetRevision: lesson-4
      helm:
        valueFiles:
          - values.yaml
    destination:
      server: https://kubernetes.default.svc
      namespace: default
    syncPolicy:
      automated:
        prune: true
        selfHeal: true

repositories:
  - name: example-app
    url:  https://github.com/petroDavydov/my-microservice-project.git
    # username: petroDavydov
    # password: YOUR_PASS

repoConfig:
  insecure: "true"
  enableLfs: "true"
